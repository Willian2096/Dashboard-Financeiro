<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Finance Life</title>

  <!-- PWA / Mobile App -->
  <meta name="theme-color" content="#09091a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finance Life">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
      background: #09091a;
      overflow: hidden;
    }
    body {
      height: 100%;
      background: #09091a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #fl-root {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    /* Loading screen */
    #fl-loading {
      position: fixed;
      inset: 0;
      background: #09091a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    #fl-loading.hidden { opacity: 0; pointer-events: none; }
    .fl-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(232,88,58,0.2);
      border-top-color: #E8583A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .fl-loading-text {
      color: #a0a0cc;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Safe area support (iPhone notch / home indicator) */
    #fl-root {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>

  <!-- Loading indicator (shown while React boots) -->
  <div id="fl-loading">
    <div class="fl-spinner"></div>
    <div class="fl-loading-text">Carregando Finance Life…</div>
  </div>

  <!-- React app mounts here -->
  <div id="fl-root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- recharts (bundles d3) -->
  <script src="https://unpkg.com/recharts@2/umd/Recharts.js" crossorigin></script>

  <!-- lucide-react icons -->
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js" crossorigin></script>

  <!-- Finance Life app (pre-transpiled) -->
  <script src="app.js"></script>

  <script>
    // Hide loading screen once React has mounted
    const _flObserver = new MutationObserver(function() {
      if (document.getElementById('fl-root').childElementCount > 0) {
        const loader = document.getElementById('fl-loading');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function(){ loader.remove(); }, 500);
        }
        _flObserver.disconnect();
      }
    });
    _flObserver.observe(document.getElementById('fl-root'), { childList: true });

    // PWA service worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
